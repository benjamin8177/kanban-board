<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drag N Drop Kanban</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="empty">
        <h2>To Do</h2>
        <div class="fill" draggable="true">Write code</div>
        <div class="fill" draggable="true">Drink coffee</div>
    </div>
    
    <div class="empty">
        <h2>In Progress</h2>
    </div>
    
    <div class="empty">
        <h2>Review</h2>
    </div>

    <div class="empty">
        <h2>Done</h2>
    </div>
    <script src="script.js"></script>
</body>
</html>
